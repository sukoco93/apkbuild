<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Data Bonus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { max-width: 420px; margin: 0 auto; padding: 0 12px; }
    .card { padding: 1rem; border-radius: 0.5rem; background: var(--pico-card-background-color); box-shadow: var(--pico-card-box-shadow); margin-bottom: 1rem; }
    .group-trx { border: 1px solid var(--pico-muted-border-color); border-radius: 0.4rem; margin-bottom: 0.8rem; overflow:hidden; }
    .group-header { background: #f8f9fa; padding: 0.6rem 0.8rem; font-weight: bold; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .item-bonus { padding: 0.6rem 0.8rem; border-bottom: 1px dashed #ddd; }
    .item-bonus:last-child { border-bottom: none; }
    .notif { padding: 0.6rem; border-radius: 0.3rem; margin: 0.8rem 0; display: none; }
    .notif.sukses { background: #d1e7dd; color: #0f5132; }
    .notif.info { background: #cff4fc; color: #055160; }
    .notif.salah { background: #f8d7da; color: #842029; }
    .angka-kanan { text-align: right; }
    .modal-wrap { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:999; padding:0.8rem; overflow-y:auto; }
    .modal-box { background:var(--pico-card-background-color); width:100%; max-width:360px; border-radius:0.5rem; margin:1rem 0; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .persen-kecil { display: flex; align-items: center; gap: 0.2rem; font-size: 0.8rem; }
    .persen-kecil input { width: 48px; padding: 0.25rem; text-align: center; font-size: 0.85rem; }
    .aksi-bawah { display:flex; gap:0.5rem; margin-top:0.8rem; flex-wrap:wrap; }
    .info-aturan { font-size:0.75rem; color:#666; margin-top:0.3rem; }
  </style>
</head>
<body x-data="dataBonus()">
  <main class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
      <h2 style="margin:0;">Daftar Bonus</h2>
      <button class="outline" @click="bukaPengaturan = true">Pengaturan</button>
    </div>

    <div x-show="pesan" x-bind:class="jenisNotif" class="notif" x-text="pesan"></div>

    <div class="card">
      <p style="margin:0.3rem 0;"><strong>Total Bonus Dibagikan:</strong> Rp <span x-text="totalSemua.toLocaleString('id-ID')"></span></p>
    </div>

    <div class="card">
      <label>Saring:</label>
      <input type="text" x-model="kataKunci" placeholder="Tanggal, nama, level…">
    </div>

    <div class="card">
      <h3>Rincian Bonus</h3>
      <div>
        <template x-for="grup in daftarKelompok()" :key="grup.trxId">
          <div class="group-trx">
            <div class="group-header" @click="grup.buka = !grup.buka">
              <span><span x-text="grup.tgl"></span> — <span x-text="grup.namaPembeli"></span></span>
              <span>Rp <span x-text="grup.totalPerTrx.toLocaleString('id-ID')"></span> <small>▼</small></span>
            </div>
            <div x-show="grup.buka">
              <template x-for="b in grup.isi" :key="b.id">
                <div class="item-bonus">
                  <div style="display:flex; justify-content:space-between;">
                    <span>Level <span x-text="b.level"></span>: <span x-text="b.namaPenerima"></span></span>
                    <strong>Rp <span x-text="b.nilai.toLocaleString('id-ID')"></span></strong>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
        <p x-show="daftarKelompok().length === 0" style="color:#888; text-align:center;">Belum ada data bonus</p>
      </div>
    </div>

    <!-- Modal Pengaturan -->
    <div x-show="bukaPengaturan" class="modal-wrap" @click.self="bukaPengaturan=false">
      <div class="modal-box">
        <div style="padding:1rem;">
          <h3 style="margin-top:0;">Pengaturan Bonus</h3>
          <form @submit.prevent="simpanPengaturan">
            <div class="grid-2">
              <label style="font-size:0.85rem;">Admin (Rp):
                <input type="number" x-model.number="pengaturan.biayaAdmin" min="0" style="padding:0.3rem;">
              </label>
              <label style="font-size:0.85rem;">Kirim (Rp):
                <input type="number" x-model.number="pengaturan.biayaKirim" min="0" style="padding:0.3rem;">
              </label>
            </div>

            <p style="margin:0.6rem 0 0.3rem; font-weight:bold; font-size:0.85rem;">Persentase Level:</p>
            <div class="grid-3">
              <div class="persen-kecil"><span>L1</span><input type="number" x-model.number="pengaturan.persen1" min="0" max="100">%</div>
              <div class="persen-kecil"><span>L2</span><input type="number" x-model.number="pengaturan.persen2" min="0" max="100">%</div>
              <div class="persen-kecil"><span>L3</span><input type="number" x-model.number="pengaturan.persen3" min="0" max="100">%</div>
              <div class="persen-kecil"><span>L4</span><input type="number" x-model.number="pengaturan.persen4" min="0" max="100">%</div>
              <div class="persen-kecil"><span>L5</span><input type="number" x-model.number="pengaturan.persen5" min="0" max="100">%</div>
              <div class="persen-kecil"><span>L6</span><input type="number" x-model.number="pengaturan.persen6" min="0" max="100">%</div>
              <div class="persen-kecil" style="grid-column: 2 / 3;"><span>L7</span><input type="number" x-model.number="pengaturan.persen7" min="0" max="100">%</div>
            </div>

            <div class="info-aturan">
              Total: <strong x-text="totalPersen + '%'"></strong> • Wajib ≤ 100% & L1&gt;L2&gt;…&gt;L7
            </div>

            <button type="submit" class="primary" style="width:100%; margin-top:0.6rem;">Simpan Pengaturan</button>
          </form>

          <hr style="margin:1rem 0 0.6rem;">
          <h4 style="margin:0 0 0.4rem; font-size:0.9rem;">Cadang & Pulihkan</h4>
          <div class="aksi-bawah">
            <button class="outline" style="flex:1; font-size:0.85rem; padding:0.4rem;" @click="cadangData()">Unduh Cadangan</button>
            <label class="outline" style="flex:1; text-align:center; padding:0.4rem; cursor:pointer; margin:0; font-size:0.85rem;">
              Pulihkan
              <input type="file" accept=".json" style="display:none;" @change="pulihkanData($event)">
            </label>
          </div>
        </div>
      </div>
    </div>

    <textarea style="display:none;" x-ref="tempatCadang"></textarea>
  </main>

  <script>
    function dataBonus() {
      return {
        daftarBonus: [],
        daftarTransaksi: [],
        daftarMember: [],
        kataKunci: '',
        bukaPengaturan: false,

        pengaturan: {
          biayaAdmin: 5000,
          biayaKirim: 3000,
          persen1: 30, persen2: 25, persen3: 20,
          persen4: 12, persen5: 7, persen6: 4, persen7: 2
        },

        pesan: '', jenisNotif: 'notif info',

        // Total persentase langsung
        get totalPersen() {
          const p = this.pengaturan;
          return p.persen1 + p.persen2 + p.persen3 + p.persen4 + p.persen5 + p.persen6 + p.persen7;
        },

        // Aturan: L1 > L2 > L3 > ... > L7
        urutMenurun() {
          const p = this.pengaturan;
          return p.persen1 > p.persen2 && p.persen2 > p.persen3 &&
                 p.persen3 > p.persen4 && p.persen4 > p.persen5 &&
                 p.persen5 > p.persen6 && p.persen6 > p.persen7;
        },

        init() {
          const simpan = localStorage.getItem('dataPengaturanBonus');
          if (simpan) this.pengaturan = JSON.parse(simpan);

          this.daftarBonus = JSON.parse(localStorage.getItem('dataBonus') || '[]');
          this.daftarTransaksi = JSON.parse(localStorage.getItem('dataPenjualan') || '[]');
          this.daftarMember = JSON.parse(localStorage.getItem('dataMember') || '[]');

          this.daftarTransaksi.forEach(trx => {
            if (!this.daftarBonus.some(b => b.transaksiId === trx.id)) {
              const hasil = this.hitungBonusTransaksi(trx, this.pengaturan);
              this.daftarBonus.push(...hasil);
            }
          });
          this.simpanBonusKeLocal();

          setInterval(() => this.cekPerubahanTransaksi(), 800);
        },

        simpanPengaturan() {
          // Validasi sebelum simpan
          if (this.totalPersen > 100) {
            this.tampilPesan('Total persentase tidak boleh lebih dari 100%', 'salah');
            return;
          }
          if (!this.urutMenurun()) {
            this.tampilPesan('Wajib L1 > L2 > L3 > L4 > L5 > L6 > L7', 'salah');
            return;
          }

          localStorage.setItem('dataPengaturanBonus', JSON.stringify(this.pengaturan));
          this.bukaPengaturan = false;
          this.tampilPesan('Pengaturan disimpan → untuk transaksi selanjutnya', 'sukses');
        },

        tampilPesan(teks, tipe = 'info') {
          this.pesan = teks;
          this.jenisNotif = 'notif ' + tipe;
          setTimeout(() => this.pesan = '', 2500);
        },

        cariMember(id) { return this.daftarMember.find(m => m.id === id); },

        telusuriJaringan(idAwal) {
          let hasil = [];
          let idSekarang = idAwal;
          for (let lvl = 1; lvl <= 7; lvl++) {
            const data = this.cariMember(idSekarang);
            if (!data) break;
            hasil.push({ level: lvl, data });
            idSekarang = data.uplineId;
          }
          return hasil;
        },

        hitungBonusTransaksi(trx, aturan) {
          const bersih = trx.keuntungan - aturan.biayaAdmin - aturan.biayaKirim;
          if (bersih <= 0) return [];

          const daftarPersen = [
            aturan.persen1, aturan.persen2, aturan.persen3,
            aturan.persen4, aturan.persen5, aturan.persen6, aturan.persen7
          ];
          const jalur = this.telusuriJaringan(trx.memberId);

          return jalur.map(pos => ({
            id: trx.id + '-' + pos.level,
            transaksiId: trx.id,
            tgl: trx.tgl,
            namaPembeli: trx.namaMember,
            namaPenerima: pos.data.nama,
            level: pos.level,
            nilai: Math.round(bersih * daftarPersen[pos.level - 1] / 100),
            snapshotAturan: aturan
          }));
        },

        simpanBonusKeLocal() {
          localStorage.setItem('dataBonus', JSON.stringify(this.daftarBonus));
        },

        salinanTrx: null,
        cekPerubahanTransaksi() {
          const sekarang = JSON.stringify(localStorage.getItem('dataPenjualan'));
          if (sekarang !== this.salinanTrx) {
            this.salinanTrx = sekarang;
            this.daftarTransaksi = JSON.parse(localStorage.getItem('dataPenjualan') || '[]');
            this.daftarMember = JSON.parse(localStorage.getItem('dataMember') || '[]');

            const adaId = this.daftarTransaksi.map(t => t.id);
            this.daftarBonus = this.daftarBonus.filter(b => adaId.includes(b.transaksiId));

            this.daftarTransaksi.forEach(trx => {
              if (!this.daftarBonus.some(b => b.transaksiId === trx.id)) {
                const hasil = this.hitungBonusTransaksi(trx, this.pengaturan);
                this.daftarBonus.push(...hasil);
              }
            });
            this.simpanBonusKeLocal();
          }
        },

        get totalSemua() { return this.daftarBonus.reduce((jml, b) => jml + b.nilai, 0); },

        daftarKelompok() {
          const kunci = {};
          this.daftarBonus.forEach(b => {
            if (!kunci[b.transaksiId]) {
              kunci[b.transaksiId] = {
                trxId: b.transaksiId,
                tgl: b.tgl,
                namaPembeli: b.namaPembeli,
                buka: true,
                isi: [],
                totalPerTrx: 0
              };
            }
            kunci[b.transaksiId].isi.push(b);
            kunci[b.transaksiId].totalPerTrx += b.nilai;
          });
          let arr = Object.values(kunci);

          if (this.kataKunci.trim()) {
            const k = this.kataKunci.toLowerCase();
            arr = arr.filter(g =>
              g.tgl.includes(k) ||
              g.namaPembeli.toLowerCase().includes(k) ||
              g.isi.some(i => i.namaPenerima.toLowerCase().includes(k) || i.level.toString().includes(k))
            );
          }
          arr.sort((a, b) => b.tgl.localeCompare(a.tgl));
          return arr;
        },

        cadangData() {
          const bundel = {
            dataMember: localStorage.getItem('dataMember'),
            dataBarang: localStorage.getItem('dataBarang'),
            dataPenjualan: localStorage.getItem('dataPenjualan'),
            dataBonus: localStorage.getItem('dataBonus'),
            dataPengaturanBonus: localStorage.getItem('dataPengaturanBonus'),
            waktu: new Date().toISOString()
          };
          const teks = JSON.stringify(bundel, null, 2);
          this.$refs.tempatCadang.value = teks;
          const nama = `cadang-bonus-${new Date().toISOString().slice(0,10)}.json`;
          const a = document.createElement('a');
          a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(teks);
          a.download = nama;
          a.click();
          this.tampilPesan('Cadangan tersimpan ke berkas', 'sukses');
        },

        pulihkanData(e) {
          const berkas = e.target.files[0];
          if (!berkas) return;
          const baca = new FileReader();
          baca.onload = (acara) => {
            try {
              const isi = JSON.parse(acara.target.result);
              if (isi.dataMember) localStorage.setItem('dataMember', isi.dataMember);
              if (isi.dataBarang) localStorage.setItem('dataBarang', isi.dataBarang);
              if (isi.dataPenjualan) localStorage.setItem('dataPenjualan', isi.dataPenjualan);
              if (isi.dataBonus) localStorage.setItem('dataBonus', isi.dataBonus);
              if (isi.dataPengaturanBonus) localStorage.setItem('dataPengaturanBonus', isi.dataPengaturanBonus);
              location.reload();
            } catch (err) {
              this.tampilPesan('Berkas cadangan tidak sah', 'salah');
            }
          };
          baca.readAsText(berkas);
        }
      }
    }
  </script>
</body>
</html>
