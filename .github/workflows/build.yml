name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    # TAMBAHKAN 3 BARIS INI:
    permissions:
      contents: write
      actions: write
        
    steps:
      # 1. Gunakan versi v4 untuk checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 17 (Standar untuk Android SDK saat ini)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Node.js v20 (LTS terbaru yang stabil)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Proses Build
      - name: Build with Cordova
        run: |
          npm install -g cordova
          
          # Mengubah ID menjadi com.tempe.legend dan Nama menjadi "Tempe Legend"
          cordova create myApp com.tempe.legend "Tempe Legend"
          
          cd myApp
          cordova platform add android
          
          # Hapus folder www bawaan Cordova dan ganti dengan folder www milik Anda
          rm -rf www
          cp -r ../www .
          
          # 1. Menyisipkan konfigurasi Ikon ke config.xml
          sed -i '/<\/widget>/i \    <icon src="www/icon-192.png" />' config.xml
          
          # 2. Menyisipkan konfigurasi Splash Screen ke config.xml
          sed -i '/<\/widget>/i \    <preference name="SplashScreen" value="screen" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="AutoHideSplashScreen" value="true" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="SplashScreenDelay" value="3000" />' config.xml
          sed -i '/<\/widget>/i \    <splash src="www/icon-192.png" />' config.xml
          
          # Menambahkan gradle.properties agar build lebih stabil
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          
          cordova build android --debug

      # 5. Membuat GitHub Release dan Mengunggah APK secara Otomatis
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release Tempe Legend v1.0.${{ github.run_number }}
          body: |
            Build otomatis dari GitHub Actions.
            - Splash screen dan ikon aplikasi telah diperbarui.
            - Status Build: Sukses.
          draft: false
          prerelease: false
          files: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
