name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Gunakan versi v4 untuk checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 17 (Standar untuk Android SDK saat ini)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Node.js v20 (LTS terbaru yang stabil)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Proses Build
      - name: Build with Cordova
        run: |
          npm install -g cordova
          
          # UPDATE: Mengubah ID menjadi com.tempe.legend dan Nama menjadi "Tempe Legend"
          cordova create myApp com.tempe.legend "Tempe Legend"
          
          cd myApp
          cordova platform add android
          
          # Hapus folder www bawaan Cordova dan ganti dengan folder www milik Anda
          rm -rf www
          cp -r ../www .
          
          # UPDATE: Menyisipkan konfigurasi Ikon langsung ke config.xml Cordova
          # Ini akan memaksa Cordova menggunakan icon-192.png sebagai logo aplikasi
          sed -i '/<\/widget>/i \    <icon src="www/icon-192.png" />' config.xml
          
          # Menambahkan gradle.properties agar build lebih stabil
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          
          cordova build android --debug

      # 5. Gunakan v4 untuk upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
