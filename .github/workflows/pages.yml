name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]  # Ganti jika branch utama Anda beda

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tentukan folder sumber Anda di sini!
          path: 'www' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
